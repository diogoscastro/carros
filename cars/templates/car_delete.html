{% extends "base.html" %}

{% block content %}
{% load static %}
  <link rel="stylesheet" href="{% static 'css/car_delete.css' %}">
  
  <div class="card">
    <div class="card-header">
      <h1 class="card-title">Deletar Carro</h1>
    </div>
    <div class="card-body">
      <p>Tem certeza que deseja deletar o carro <strong>{{ object.brand }} {{ object.model }}</strong>?</p>
      <form method="post">
        {% csrf_token %}
        <div class="buttons-container">
          <button type="submit" class="btn btn-danger"><i class="bi bi-trash me-2"></i>Remover Carro</button>
          <a href="{% url 'car_update' pk=object.pk %}" class="btn btn-secondary"><i class="bi bi-x-circle me-2"></i>Cancelar</a>
        </div>
      </form>
    </div>
  </div>
{% endblock %}
