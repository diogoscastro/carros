{% extends 'base.html' %}

{% block content %}
  <style>
    form {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 15px;
        margin-top: 30px;
    }

    input, textarea {
        width: 300px;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 5px;
    }

    button {
        padding: 10px 20px;
        background-color: #007bff;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }

    button:hover {
        background-color: #0056b3;
    }
  </style>

  <h2 style="text-align:center;">Adicionar Novo Carro</h2>
  
  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ new_car_form.as_p }}
    <button type="submit">Cadastrar</button>
  </form>
{% endblock %}
