{% extends 'base.html' %}

{% block content %}
  <h2>Cadastro</h2>
  <form method="post">
    {% csrf_token %}
    <div class="form-group">
      {{ user_form.username.errors }}
      <label>Usuário</label>
      {{ user_form.username }}
    </div>
    <div class="form-group">
      {{ user_form.password1.errors }}
      <label>Senha: </label>
      {{ user_form.password1 }}
    </div>
    <div class="form-group">
      {{ user_form.password2.errors }}
      <label>Confirmar Senha: </label>
      {{ user_form.password2 }}
    </div>
    <div class="form-group">
      <button type="submit">Cadastrar</button>
    </div>
  </form>
{% endblock %}
